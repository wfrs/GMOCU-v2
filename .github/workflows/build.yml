name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: |
          npm run build
          npx electron-builder --win --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: jlab-windows
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: |
          npm run build
          npx electron-builder --mac --publish never

      - name: Upload disk image
        uses: actions/upload-artifact@v4
        with:
          name: jlab-macos
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30
